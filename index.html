<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Công an tỉnh XX — Quản lý Tang Vật Vi phạm Hành chính</title>
    <script>
      // SPA GitHub Pages: restore URL đã lưu bởi 404.html
      (function () {
        var redirect = sessionStorage.getItem('spa_redirect');
        if (redirect) {
          sessionStorage.removeItem('spa_redirect');
          // Chỉ restore nếu khác URL hiện tại (tránh loop)
          if (redirect !== window.location.href) {
            window.history.replaceState(null, null, redirect);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
