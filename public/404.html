<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Quản lý Tang Vật</title>
    <script>
      // Lưu URL đầy đủ vào sessionStorage rồi redirect về root
      // index.html sẽ đọc lại và dùng history.replaceState để restore
      sessionStorage.setItem('spa_redirect', window.location.href);
      window.location.replace('/qltv/');
    </script>
  </head>
  <body>
    <p>Đang chuyển hướng...</p>
  </body>
</html>
